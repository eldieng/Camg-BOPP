[build]
  command = "echo 'Building CAMG-BOPP frontend...' && npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "/api"

# Proxy API vers le backend Render (AVANT le catch-all)
[[redirects]]
  from = "/api/*"
  to = "https://camg-bopp-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA catch-all
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
